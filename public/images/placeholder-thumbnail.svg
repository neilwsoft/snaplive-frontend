<svg width="338" height="220" viewBox="0 0 338 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="338" height="220" fill="#F1F5F9"/>

  <!-- Camera icon -->
  <g transform="translate(129, 60)">
    <!-- Camera body -->
    <rect x="0" y="20" width="80" height="60" rx="8" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="2"/>

    <!-- Camera lens -->
    <circle cx="40" cy="50" r="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="40" cy="50" r="10" fill="#E2E8F0"/>

    <!-- Flash -->
    <rect x="55" y="28" width="12" height="8" rx="2" fill="#CBD5E1"/>

    <!-- Viewfinder bump -->
    <path d="M20 20 L30 8 H50 L60 20" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <text x="169" y="170" text-anchor="middle" fill="#94A3B8" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="500">No Thumbnail</text>
  <text x="169" y="190" text-anchor="middle" fill="#CBD5E1" font-size="12" font-family="system-ui, -apple-system, sans-serif">338 x 220</text>
</svg>
